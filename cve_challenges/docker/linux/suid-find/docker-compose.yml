services:
  suid-find:
    build:
      context: .
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{lnx-06-default}}
    ports:
      - "10301:22"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/22' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
