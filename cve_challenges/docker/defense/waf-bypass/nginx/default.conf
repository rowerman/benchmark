upstream backend {
    server backend:5000;
}

server {
    listen 80;

    # WAF: Block SQLi patterns in query string (case-sensitive matching)
    # Blocked: union select, ' OR 1=1, information_schema
    set $blocked 0;

    # Check request body (POST data)
    if ($request_body ~* "union\s+select") {
        set $blocked 1;
    }
    if ($request_body ~* "'\s*OR\s+1\s*=\s*1") {
        set $blocked 1;
    }
    if ($request_body ~* "information_schema") {
        set $blocked 1;
    }
    if ($request_body ~* "1\s*=\s*1\s*--") {
        set $blocked 1;
    }

    location / {
        if ($blocked = 1) {
            return 403 "WAF: Request blocked\n";
        }
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }
}
