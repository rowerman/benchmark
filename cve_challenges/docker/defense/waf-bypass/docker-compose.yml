services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{def-01-default}}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx-waf:
    build:
      context: .
      dockerfile: nginx-waf.Dockerfile
    ports:
      - "10801:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
