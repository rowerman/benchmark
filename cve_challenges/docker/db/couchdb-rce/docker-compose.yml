services:
  couchdb:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CVE_FLAG: ${CVE_FLAG}
    container_name: db08-couchdb-rce
    ports:
      - "10208:5984"
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: admin123
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5984/_up > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
