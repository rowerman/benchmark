# WAF defense layer — inserts ModSecurity-style proxy in front of any web service.
# Usage: merge this into the target scenario's docker-compose.yml
#   docker compose -f docker-compose.yml -f ../../_defense/waf-compose-fragment.yml up

services:
  waf:
    build:
      context: ../../../../../
      dockerfile: benchmarks/cve_challenges/docker/_defense/WAF.Dockerfile
    ports:
      - "${WAF_PORT:-8080}:8080"
    environment:
      BACKEND_HOST: "${WAF_BACKEND_HOST:-web}"
      BACKEND_PORT: "${WAF_BACKEND_PORT:-80}"
    depends_on:
      - web
    networks:
      - default
