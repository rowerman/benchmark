services:
  attacker:
    build:
      context: ./attacker
    container_name: net01-attacker
    network_mode: "service:server"
    depends_on:
      server:
        condition: service_started
    cap_add:
      - NET_ADMIN
      - NET_RAW

  server:
    build:
      context: ./server
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{net-01-default}}
    container_name: net01-server
    ports:
      - "10901:22"
    environment:
      ADMIN_PASSWORD: ${CVE_FLAG:-flag{net-01-default}}
    networks:
      - net-lan
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  client:
    build:
      context: ./client
    container_name: net01-client
    environment:
      ADMIN_PASSWORD: ${CVE_FLAG:-flag{net-01-default}}
    networks:
      - net-lan
    depends_on:
      server:
        condition: service_healthy

networks:
  net-lan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.1.0/24
