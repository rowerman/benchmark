services:
  attacker:
    build:
      context: ./attacker
    container_name: net02-attacker
    network_mode: "service:server"
    depends_on:
      server:
        condition: service_started
    cap_add:
      - NET_ADMIN
      - NET_RAW

  server:
    build:
      context: ./server
    container_name: net02-server
    ports:
      - "10902:22"
    networks:
      - net-dns
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f exfil.py || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  net-dns:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.2.0/24
