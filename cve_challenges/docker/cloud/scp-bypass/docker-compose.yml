services:
  attacker:
    build:
      context: ./attacker
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{cloud-15-default}}
    ports:
      - "10615:5000"
    environment:
      - FLAG=${CVE_FLAG:-flag{cloud-15-default}}
      - IAM_URL=http://iam:5000
  iam:
    build:
      context: ../_infra/iam-trust

  # socat proxy — expose IAM/STS to host for nmap detection
  iam-proxy:
    image: alpine/socat:latest
    ports:
      - "10702:10702"
    command: "TCP-LISTEN:10702,fork,reuseaddr TCP:iam:5000"
    depends_on:
      - iam
