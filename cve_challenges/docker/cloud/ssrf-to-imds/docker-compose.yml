services:
  web:
    build:
      context: ./web
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{cloud-01-default}}
    ports:
      - "10601:5000"
    environment:
      - FLAG=${CVE_FLAG:-flag{cloud-01-default}}
    networks:
      cloud-net:
        ipv4_address: 169.254.0.10
    depends_on:
      - imds
      - s3
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  imds:
    build:
      context: ../_infra/imds-server
    environment:
      IMDS_ROLE_NAME: ec2-role
      IMDS_ACCESS_KEY_ID: AKIACLOUD01EXAMPLE
      IMDS_SECRET_ACCESS_KEY: cloud01-imds-secret-key
      IMDS_SESSION_TOKEN: mock-session-token-base64-cloud01
      IMDS_INSTANCE_ID: i-0abc123def
      IMDS_AZ: us-east-1a
    networks:
      cloud-net:
        ipv4_address: 169.254.169.254
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  s3:
    build:
      context: ./s3
    environment:
      S3_ACCESS_KEY: AKIACLOUD01EXAMPLE
      S3_SECRET_KEY: cloud01-imds-secret-key
      FLAG2: flag{cloud-01-step2-imds}
    networks:
      cloud-net:
        ipv4_address: 169.254.0.20
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # socat proxies — expose internal services to host for nmap detection
  imds-proxy:
    image: alpine/socat:latest
    ports:
      - "10701:10701"
    command: "TCP-LISTEN:10701,fork,reuseaddr TCP:169.254.169.254:5000"
    networks:
      cloud-net:
    depends_on:
      imds:
        condition: service_healthy

  s3-proxy:
    image: alpine/socat:latest
    ports:
      - "10704:10704"
    command: "TCP-LISTEN:10704,fork,reuseaddr TCP:s3:5000"
    networks:
      cloud-net:
    depends_on:
      s3:
        condition: service_healthy

networks:
  cloud-net:
    driver: bridge
    ipam:
      config:
        - subnet: 169.254.0.0/16
