services:
  attacker:
    build:
      context: ./attacker
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{cloud-16-default}}
    ports:
      - "10616:5000"
    environment:
      - FLAG=${CVE_FLAG:-flag{cloud-16-default}}
      - API_URL=http://resource-api:5000
  resource-api:
    build: ./resource-api
    environment:
      - FLAG2=flag{cloud-16-step2-silent}
      - AUDIT_URL=http://audit-log:5000
  audit-log:
    build: ./audit-log
