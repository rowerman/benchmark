services:
  attacker:
    build:
      context: ./attacker
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{cloud-18-default}}
    ports:
      - "10618:5000"
    environment:
      
      - FW_URL=http://firewall:5000
  firewall:
    build: ./firewall
  internal-api:
    build: ./internal-api
    environment:
      - FLAG=flag{cloud-18-svc-tag}
