services:
  attacker:
    build:
      context: ./attacker
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{cloud-11-default}}
    ports:
      - "10611:5000"
    environment:
      - FLAG=${CVE_FLAG:-flag{cloud-11-default}}
      - OIDC_URL=http://oidc:5000
      - IAM_URL=http://iam:5000
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  oidc:
    build:
      context: ../_infra/oidc-idp
    environment:
      - OIDC_ISSUER=https://token.actions.githubusercontent.com
      - OIDC_TOKEN_TTL=3600

  iam:
    build:
      context: ../_infra/iam-trust
    environment:
      - OIDC_JWKS_URL=http://oidc:5000/.well-known/jwks.json
      - IAM_ROLES_FILE=/app/roles/default.yaml
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # socat proxies — expose internal services to host for nmap detection
  oidc-proxy:
    image: alpine/socat:latest
    ports:
      - "10703:10703"
    command: "TCP-LISTEN:10703,fork,reuseaddr TCP:oidc:5000"
    depends_on:
      - oidc

  iam-proxy:
    image: alpine/socat:latest
    ports:
      - "10702:10702"
    command: "TCP-LISTEN:10702,fork,reuseaddr TCP:iam:5000"
    depends_on:
      iam:
        condition: service_healthy
