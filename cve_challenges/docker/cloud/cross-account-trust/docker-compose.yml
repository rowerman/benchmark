services:
  attacker:
    build:
      context: ./attacker
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{cloud-12-default}}
    ports:
      - "10612:5000"
    environment:
      - FLAG=${CVE_FLAG:-flag{cloud-12-default}}
      - IAM_URL=http://iam:5000
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  iam:
    build:
      context: ../_infra/iam-trust
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # socat proxies — expose internal services to host for nmap detection
  iam-proxy:
    image: alpine/socat:latest
    ports:
      - "10702:10702"
    command: "TCP-LISTEN:10702,fork,reuseaddr TCP:iam:5000"
    depends_on:
      iam:
        condition: service_healthy

  s3-proxy:
    image: alpine/socat:latest
    ports:
      - "10704:10704"
    command: "TCP-LISTEN:10704,fork,reuseaddr TCP:s3:5000"
    depends_on:
      - s3

  s3:
    build: ./s3
    environment:
      - FLAG2=flag{cloud-12-step2-cross-account}
