services:
  inference:
    build: ./inference
    environment:
      - FLAG=flag{cloud-22-step2-inference}
  tenant-a:
    build:
      context: ./tenant-a
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{cloud-22-default}}
    ports:
      - "10622:5000"
    environment:
      
      - INFERENCE_URL=http://inference:5000
