services:
  gateway:
    build:
      context: ./gateway
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{cloud-04-default}}
    ports:
      - "10604:5000"
    environment:
      - FLAG=${CVE_FLAG:-flag{cloud-04-default}}
      - LAMBDA_URL=http://lambda:5000/run
    networks:
      - cloud-net
    depends_on:
      - lambda
      - iam
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  lambda:
    build:
      context: ./lambda
    environment:
      - FLAG2=flag{cloud-04-step2-lambda}
      - IAM_ACCESS_KEY_ID=AKIALAMBDAEXAMPLE
      - IAM_SECRET_KEY=lambda-iam-secret-key
    networks:
      - cloud-net
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  iam:
    build:
      context: ../_infra/iam-trust
    environment:
      - IAM_ROLES_FILE=/app/roles/default.yaml
      - IAM_CREDENTIAL_TTL=3600
    networks:
      - cloud-net
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # socat proxies — expose internal services to host for nmap detection
  iam-proxy:
    image: alpine/socat:latest
    ports:
      - "10702:10702"
    command: "TCP-LISTEN:10702,fork,reuseaddr TCP:iam:5000"
    networks:
      - cloud-net
    depends_on:
      iam:
        condition: service_healthy

  lambda-proxy:
    image: alpine/socat:latest
    ports:
      - "10705:10705"
    command: "TCP-LISTEN:10705,fork,reuseaddr TCP:lambda:5000"
    networks:
      - cloud-net
    depends_on:
      lambda:
        condition: service_healthy

networks:
  cloud-net:
    driver: bridge
