services:
  attacker:
    build:
      context: ./attacker
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{cloud-14-default}}
    ports:
      - "10614:5000"
    environment:
      - FLAG=${CVE_FLAG:-flag{cloud-14-default}}
      - IAM_URL=http://iam:5000
      - LAMBDA_URL=http://lambda:5000
  lambda:
    build: ./lambda
    environment:
      - FLAG2=flag{cloud-14-step2-passrole}
  iam:
    build:
      context: ../_infra/iam-trust

  # socat proxies — expose internal services to host for nmap detection
  iam-proxy:
    image: alpine/socat:latest
    ports:
      - "10702:10702"
    command: "TCP-LISTEN:10702,fork,reuseaddr TCP:iam:5000"
    depends_on:
      - iam

  lambda-proxy:
    image: alpine/socat:latest
    ports:
      - "10705:10705"
    command: "TCP-LISTEN:10705,fork,reuseaddr TCP:lambda:5000"
    depends_on:
      - lambda
