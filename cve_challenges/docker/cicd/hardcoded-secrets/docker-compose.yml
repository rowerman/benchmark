services:
  gitea:
    image: gitea/gitea:1.21
    ports:
      - "10703:3000"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__ROOT_URL=http://localhost:10703
    volumes:
      - gitea_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  gitea-init:
    image: alpine:3.19
    depends_on:
      gitea:
        condition: service_healthy
    volumes:
      - ./init/setup.sh:/setup.sh
    environment:
      - GITEA_URL=http://gitea:3000
      - ADMIN_USER=developer
      - ADMIN_PASS=password123
      - CVE_FLAG=${CVE_FLAG:-flag{ci-03-default}}
    command: ["sh", "/setup.sh"]

volumes:
  gitea_data:
