services:
  gitea:
    image: gitea/gitea:1.21
    ports:
      - "10705:3000"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__ROOT_URL=http://localhost:10705
    volumes:
      - gitea_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  runner:
    build: ./runner
    ports:
      - "10712:5000"
    environment:
      - FLAG=${CVE_FLAG:-flag{ci-05-default}}
      - GITEA_URL=http://gitea:3000
      - GITEA_ADMIN_USER=developer
      - GITEA_ADMIN_PASS=password123
      - GITEA_REPO=myapp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      gitea:
        condition: service_healthy

volumes:
  gitea_data:
