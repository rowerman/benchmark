services:
  gitea:
    image: gitea/gitea:1.21
    ports:
      - "10701:3000"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__ROOT_URL=http://localhost:10701
      - GITEA__webhook__ALLOWED_HOST_LIST=*
      - GITEA__security__SECRET_KEY=ci01-secret-key-2026
      - GITEA_ADMIN_USER=developer
      - GITEA_ADMIN_PASS=password123
    volumes:
      - gitea_data:/data
      - ./gitea/init.sh:/usr/local/bin/gitea-init.sh
    entrypoint: ["/bin/sh"]
    command: ["/usr/local/bin/gitea-init.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  runner:
    build: ./runner
    ports:
      - "10711:5000"
    environment:
      - FLAG=${CVE_FLAG:-flag{ci-01-default}}
      - GITEA_URL=http://gitea:3000
      - GITEA_ADMIN_USER=developer
      - GITEA_ADMIN_PASS=password123
      - GITEA_REPO=project-x
      - WEBHOOK_URL=http://runner:5000/webhook
    depends_on:
      gitea:
        condition: service_healthy

volumes:
  gitea_data:
