services:
  web:
    build:
      context: ./app
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{web-17-default}}
    ports:
      - "10117:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
