services:
  db:
    image: mysql:8.0.35
    ports:
      - "10306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: vulnapp
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
    command: --secure-file-priv=""
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./flag.txt:/flag.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{web-08-default}}
    ports:
      - "10108:80"
    volumes:
      - ./app:/var/www/html
    environment:
      DB_HOST: db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
