services:
  waf:
    build:
      context: ../../../../../../../
      dockerfile: benchmarks/cve_challenges/docker/_defense/WAF.Dockerfile
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{web-01-default}}
    ports:
      - "10101:8080"
    environment:
      BACKEND_HOST: tomcat
      BACKEND_PORT: "8080"
    depends_on:
      - tomcat
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Backend — built from base Dockerfile but NOT exposed to host
  tomcat:
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{web-01-default}}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
