services:
  waf:
    build:
      context: ../../../../../../../
      dockerfile: benchmarks/cve_challenges/docker/_defense/WAF.Dockerfile
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{web-03-default}}
    ports:
      - "10103:8080"
    environment:
      BACKEND_HOST: wordpress
      BACKEND_PORT: "80"
    depends_on:
      - wordpress
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Backend — built from base Dockerfile but NOT exposed to host
  wordpress:
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{web-03-default}}
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: mysql:8.0.35
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
