<!DOCTYPE html>
<html lang="en">
<head>
    <title>Shipping Request Form</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        h1 { color: #fff; text-align: center; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: rgba(255,255,255,0.85); text-align: center; margin-bottom: 28px; font-size: 16px; }
        .card { background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); padding: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: #555; margin-bottom: 6px; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: border-color 0.2s; }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { min-height: 80px; resize: vertical; font-family: inherit; }
        button { width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .result { background: #f8f9fa; border-radius: 8px; padding: 20px; margin-top: 20px; border-left: 4px solid #667eea; }
        .result h3 { color: #667eea; margin-bottom: 8px; }
        .footer { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.7); font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Shipping Request Form</h1>
        <p class="subtitle">Submit a shipping request for your items</p>

        <div class="card">
            <form action="/submit" method="post">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="company">Company</label>
                    <input type="text" id="company" name="company" placeholder="Company name (optional)">
                </div>
                <div class="form-group">
                    <label for="item">Item Description</label>
                    <textarea id="item" name="item" placeholder="Describe the item you want to ship..."></textarea>
                </div>
                <button type="submit">Submit Request</button>
            </form>
        </div>
        <div class="footer">Shipping Request System v2.1 &mdash; All fields are processed securely.</div>
    </div>
</body>
</html>
