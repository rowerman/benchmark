<!DOCTYPE html>
<html lang="en">
<head>
    <title>Submission Result</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        h1 { color: #fff; text-align: center; margin-bottom: 28px; }
        .card { background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); padding: 32px; }
        .result { background: #f8f9fa; border-radius: 8px; padding: 20px; border-left: 4px solid #667eea; font-size: 16px; line-height: 1.6; }
        .back { display: inline-block; margin-top: 20px; color: #667eea; text-decoration: none; font-weight: 600; }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Request Received</h1>
        <div class="card">
            <div class="result">{{ message|safe }}</div>
            <a href="/" class="back">&larr; Submit another request</a>
        </div>
    </div>
</body>
</html>
