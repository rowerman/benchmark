services:
  waf:
    build:
      context: ../../../../../../
      dockerfile: benchmarks/cve_challenges/docker/_defense/WAF.Dockerfile
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{web-15-default}}
    ports:
      - "10115:8080"
    environment:
      BACKEND_HOST: web
      BACKEND_PORT: "5000"
    depends_on:
      - web
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Backend — built from base Dockerfile but NOT exposed to host
  web:
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{web-15-default}}
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
