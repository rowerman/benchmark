services:
  web:
    build:
      context: ./app
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{web-10-default}}
    ports:
      - "10110:5000"
    networks:
      - ssrf-net
    depends_on:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  internal:
    build:
      context: ./internal
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{web-10-default}}
    networks:
      - ssrf-net
    expose:
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  ssrf-net:
    driver: bridge
