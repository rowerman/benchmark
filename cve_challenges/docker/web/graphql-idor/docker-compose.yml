services:
  web:
    build:
      context: ./app
      args:
        CVE_FLAG: ${CVE_FLAG:-flag{web-16-default}}
    ports:
      - "10116:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
