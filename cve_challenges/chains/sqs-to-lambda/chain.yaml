# Chain: "Cloud SQS Intercept to Lambda Command Injection" (Chain-39)
# Steps: 4 | Domains: Cloud ×4 (Pure Cloud)
name: "Cloud SQS Intercept to Lambda Command Injection"
chain_id: Chain-39
steps: 4
domains: [cloud, cloud, cloud, cloud]
nodes:
  - step: 1
    scenario: cloud-06
    description: "SQS Message Interception — List queues without auth, receive messages to discover flag and credentials"
    flag: "flag{c39-step1-sqs}"
    next_hint: "One of the SQS messages contains a JSON blob with low-priv IAM credentials. Use them to authenticate and escalate."

  - step: 2
    scenario: cloud-02
    description: "IAM Privilege Escalation — Exploit iam:CreatePolicy + iam:AttachUserPolicy to escalate lowpriv to admin, access protected S3 bucket"
    flag: "flag{c39-step2-iam}"
    next_hint: "With admin access, enumerate Lambda functions. Discover the vulnerable 'process-order' function."

  - step: 3
    scenario: cloud-04
    description: "Lambda Code Injection — Invoke process-order function with command injection payload to read the flag from Lambda environment"
    flag: "flag{c39-step3-lambda}"
    next_hint: "The Lambda function hints at a KMS-encrypted secret. Check s3://secure-data/."

  - step: 4
    scenario: cloud-08
    description: "KMS Decryption Oracle — Download encrypted flag and metadata from S3, use kms:Decrypt to retrieve the plaintext final flag"
    flag: "flag{c39-step4-kms}"
    next_hint: null
