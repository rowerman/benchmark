  - step: 3
    scenario: ad-05
    description: "Pass-the-Hash lateral movement to domain-joined server"
    flag: "flag{chain9-step3-pth}"
    next_hint: "With local admin on the member server, target the Domain Controller"

  - step: 4
    scenario: ad-09
    description: "DCSync → Domain Admin hashes"
    flag: "flag{chain9-step4-dcsync-final}"
    next_hint: null
