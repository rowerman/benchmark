    scenario: web-09
    description: "MSSQL xp_cmdshell via SQLi entry point"
    flag: "flag{chain9-step1-mssql}"
    next_hint: "Use xp_cmdshell to enumerate the MSSQL host and find linked servers"

  - step: 2
    scenario: db-04
    description: "MSSQL linked server chain — privilege escalation across linked instances"
