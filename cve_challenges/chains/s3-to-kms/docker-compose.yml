services:
  localstack:
    image: localstack/localstack:3.5.0
    ports:
      - "11638:4566"
    environment:
      - SERVICES=s3,iam,sts,kms
      - AWS_DEFAULT_REGION=us-east-1
      - EDGE_PORT=4566
    volumes:
      - ./init/:/etc/localstack/init/ready.d/
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
